<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Internal Brand Hub – Gradle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Intel+One+Mono&family=Lato:ital,wght@0,300;0,400;0,700;0,900&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       DESIGN TOKENS
       ============================================================ */
    :root {
      --color-bg:          #0c1018;
      --color-white:       #ffffff;
      --font-mono:         'Intel One Mono', 'Courier New', monospace;
      --font-sans:         'Lato', sans-serif;

      /* Proportions based on Figma frame: 1440 × 1024 */
      --split-pct:         46.67%;   /* 672 / 1440 */
      --folder-back-top:   8.49vh;   /* 86.92 / 1024 */
      --folder-mid-top:    14.54vh;  /* 148.92 / 1024 */
      --folder-front-top:  20.60vh;  /* 210.92 / 1024 */
      --folder-extra-top:  26.66vh;  /* 272.92 / 1024 */
      --folder-fifth-top:  32.72vh;  /* 334.92 / 1024 */
      --folder-sixth-top:  38.78vh;  /* 396.92 / 1024 */
      --folder-seventh-top: 44.84vh; /* 458.92 / 1024 */
      --folder-label-pad:  31px;
    }

    /* ============================================================
       BASE RESET
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-white);
      overflow-x: hidden;
    }

    /* ============================================================
       HERO SECTION
       ============================================================ */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 640px;
      overflow: hidden;
    }

    /* ----------------------------------------------------------
       Left panel: teal background image (0 → ~46.67%)
       ---------------------------------------------------------- */
    .hero__bg {
      position: absolute;
      left: 0;
      top: 0;
      width: var(--split-pct);
      height: 100%;
      z-index: 0;
      background: url('Images/background.png') center / cover no-repeat;
    }

    /* ----------------------------------------------------------
       Right panel: dark background (sits behind folders)
       ---------------------------------------------------------- */
    .hero__right-bg {
      position: absolute;
      left: var(--split-pct);
      top: 0;
      right: 0;
      height: 100%;
      z-index: 0;
      background: var(--color-bg);
    }

    /* ----------------------------------------------------------
       Folder panels — SVG-based, stacked back to front.
       Each folder uses Folder.svg as a background-image, sized
       by height (81.15vh) with auto width. The dark fill (#0B0D0F)
       of the SVG is extended by background-color for areas beyond
       the SVG's rendered width.
       ---------------------------------------------------------- */
    .hero__folder {
      position: absolute;
      left: var(--split-pct);
      right: -120px;
      bottom: -120px;
      background: #0B0D0F url('Images/Folder.svg') left top / auto 81.15vh no-repeat;
      user-select: none;
      cursor: default;
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .hero__folder:hover {
      transform: translateX(-10px);
    }

    .hero__folder--back  { top: var(--folder-back-top);  z-index: 1; opacity: 1.00; }
    .hero__folder--mid   { top: var(--folder-mid-top);   z-index: 2; opacity: 1.00; }
    .hero__folder--front { top: var(--folder-front-top); z-index: 3; opacity: 1.00; }
    .hero__folder--extra { top: var(--folder-extra-top); z-index: 4; opacity: 1.00; }
    .hero__folder--fifth   { top: var(--folder-fifth-top);   z-index: 5; opacity: 1.00; }
    .hero__folder--sixth   { top: var(--folder-sixth-top);   z-index: 6; opacity: 1.00; }
    .hero__folder--seventh { top: var(--folder-seventh-top); z-index: 7; opacity: 1.00; }

    /* Label sits in the tab area of the SVG folder.
       Tab height = 56 / 814 × 81.15vh ≈ 5.58vh */
    .folder-label {
      position: absolute;
      top: 0;
      left: 0;
      height: 5.58vh;
      padding-left: var(--folder-label-pad);
      display: flex;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 400;
      color: var(--color-white);
      white-space: nowrap;
      transition: color 0.2s ease;
    }

    .hero__folder:hover .folder-label {
      color: #40BCC1;
    }

    /* ----------------------------------------------------------
       Logo + Headline — positioned in the lower-left quadrant
       ---------------------------------------------------------- */
    .hero__content {
      position: absolute;
      left: 50px;
      bottom: 50px;
      width: min(560px, calc(var(--split-pct) - 80px));
      z-index: 5;
    }

    .hero__logo {
      display: block;
      width: 140px;
      height: auto;
      margin-bottom: 20px;
    }

    .hero__headline {
      font-family: var(--font-sans);
      font-size: clamp(44px, 6.67vw, 96px);
      font-weight: 400;
      line-height: 0.9;
      color: var(--color-white);
    }

    /* ============================================================
       MOBILE FOLDER CARDS (shown only on small screens)
       ============================================================ */
    .hero__folder-cards {
      display: none;
    }

    .folder-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 10px;
      font-family: var(--font-mono);
      font-size: 16px;
      color: var(--color-white);
    }

    .folder-card-icon {
      width: 20px;
      height: 16px;
      flex-shrink: 0;
      position: relative;
    }

    .folder-card-icon::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 14px;
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
    }

    .folder-card-icon::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 10px;
      height: 7px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px 2px 0 0;
    }

    /* ============================================================
       RESPONSIVE — Tablet (≤ 1100px)
       ============================================================ */
    @media (max-width: 1100px) {
      .hero__content {
        left: 36px;
      }

      .folder-label {
        font-size: 17px;
      }
    }

    /* ============================================================
       RESPONSIVE — Mobile (≤ 767px)
       ============================================================ */
    @media (max-width: 767px) {
      .hero {
        height: auto;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .hero__bg {
        width: 100%;
        opacity: 0.80;
      }

      .hero__right-bg,
      .hero__folder { display: none; }

      .hero__content {
        position: relative;
        bottom: auto;
        left: auto;
        width: auto;
        padding: 56px 24px 36px;
      }

      .hero__headline {
        font-size: clamp(44px, 14vw, 68px);
      }

      .hero__folder-cards {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 0 24px 56px;
        z-index: 5;
      }
    }

    /* ============================================================
       RESPONSIVE — Small mobile (≤ 479px)
       ============================================================ */
    @media (max-width: 479px) {
      .hero__content {
        padding: 48px 20px 32px;
      }

      .hero__folder-cards {
        padding: 0 20px 48px;
      }

      .folder-card {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">

    <!-- Left teal gradient panel -->
    <div class="hero__bg" aria-hidden="true"></div>

    <!-- Right dark panel (sits behind folders) -->
    <div class="hero__right-bg" aria-hidden="true"></div>

    <!-- =====================================================
         Folder panels — desktop (stacked back to front)
         Each folder extends from its top position to the
         bottom of the viewport, with z-index layering making
         only the top "tab" area of back folders visible.
         ===================================================== -->
    <div class="hero__folder hero__folder--back" aria-hidden="true">
      <span class="folder-label">Presentations</span>
    </div>
    <div class="hero__folder hero__folder--mid" aria-hidden="true">
      <span class="folder-label">Social Media Headers</span>
    </div>
    <div class="hero__folder hero__folder--front" aria-hidden="true">
      <span class="folder-label">Letterheads</span>
    </div>
    <div class="hero__folder hero__folder--extra" aria-hidden="true">
      <span class="folder-label">Email Signature</span>
    </div>
    <div class="hero__folder hero__folder--fifth" aria-hidden="true">
      <span class="folder-label">Copy &amp; Tone Guide</span>
    </div>
    <div class="hero__folder hero__folder--sixth" aria-hidden="true">
      <span class="folder-label">Brand Style Guide</span>
    </div>
    <div class="hero__folder hero__folder--seventh" aria-hidden="true">
      <span class="folder-label">Asset Library</span>
    </div>

    <!-- =====================================================
         Logo + Headline — lower-left quadrant
         ===================================================== -->
    <div class="hero__content">
      <img
        class="hero__logo"
        src="Images/LOGO-GRADLE-HZ.svg"
        alt="Gradle Technologies"
      >
      <h1 class="hero__headline">Make it unmistakably Gradle.</h1>
    </div>

    <!-- =====================================================
         Folder cards — mobile only
         ===================================================== -->
    <div class="hero__folder-cards" aria-label="Brand asset categories">
      <div class="folder-card">
        <span class="folder-card-icon" aria-hidden="true"></span>
        Presentations
      </div>
      <div class="folder-card">
        <span class="folder-card-icon" aria-hidden="true"></span>
        Social Media Headers
      </div>
      <div class="folder-card">
        <span class="folder-card-icon" aria-hidden="true"></span>
        Letterheads
      </div>
      <div class="folder-card">
        <span class="folder-card-icon" aria-hidden="true"></span>
        Email Signature
      </div>
      <div class="folder-card">
        <span class="folder-card-icon" aria-hidden="true"></span>
        Copy &amp; Tone Guide
      </div>
      <div class="folder-card">
        <span class="folder-card-icon" aria-hidden="true"></span>
        Brand Style Guide
      </div>
      <div class="folder-card">
        <span class="folder-card-icon" aria-hidden="true"></span>
        Asset Library
      </div>
    </div>

  </section>
</body>
</html>
