<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gradle Social Ad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 40px 80px;
      gap: 32px;
    }

    /* ── Format switcher nav ── */
    .size-nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .nav-btn {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #aaa;
      cursor: pointer;
      font-family: sans-serif;
      font-size: 13px;
      line-height: 1.4;
      padding: 8px 16px;
      text-align: center;
      transition: background 0.15s, color 0.15s;
    }
    .nav-btn:hover { background: #2a2a2a; color: #fff; }
    .nav-btn.active { background: #209bc4; border-color: #209bc4; color: #fff; }
    .nav-btn small { display: block; font-size: 11px; opacity: 0.75; }

    /* ── Headline switcher nav ── */
    .hl-nav { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .hl-nav:empty { display: none; }

    /* ── Download bar ── */
    .dl-nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }
    .dl-label { color: #555; font-family: sans-serif; font-size: 12px; letter-spacing: .05em; text-transform: uppercase; }
    .dl-btn:disabled, .dl-all-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .dl-all-btn { border-color: #2a5a2a; color: #6dbf6d; }
    .dl-all-btn:hover:not(:disabled) { background: #1a2e1a; color: #8fd48f; }

    /* ── Canvas wrapper ── */
    .canvas-wrap { display: flex; justify-content: center; }

    /* ── Canvas — dimensions driven by CSS vars ── */
    .canvas {
      position: relative;
      width: var(--cw, 1200px);
      height: var(--ch, 628px);
      background-color: #0b0d0f;
      overflow: hidden;
      flex-shrink: 0;

      /* LinkedIn defaults */
      --cw: 1200px; --ch: 628px;
      --lx: 63px;  --ly: 83px;  --lw: 327px; --lh: 91px;
      --ix: 747px; --iy: 24px;  --ih: 604px;
      --hx: 63px;  --hy: 218px; --hs: 82px; --hls: -2px; --hmw: 700px;
      --bx: 63px;  --by: 484px; --bh: 84px; --bfs: 30.6px; --bpad: 39px; --br: 8px;
    }

    /* ── Background gradient ── */
    .bg-gradient {
      position: absolute;
      inset: 0;
      background: radial-gradient(119.04% 58.82% at 50% 98.95%, #209BC4 0%, #08090A 100%);
    }

    /* ── Gradle Technologies logo ── */
    .logo {
      position: absolute;
      left: var(--lx);
      top: var(--ly);
      width: var(--lw);
      height: var(--lh);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Right-side image (PNG img or SVG wrapper div) ── */
    .right-img {
      position: absolute;
      left: var(--ix);
      top: var(--iy);
      height: var(--ih);
      width: auto;
      display: block;
    }
    .right-img svg { width: auto; height: 100%; display: block; }

    /* ── Stacked layout: image fills full width at top ── */
    .canvas.stacked .right-img {
      left: 0;
      top: 0;
      width: 100%;
      height: var(--ih);
      object-fit: cover;
      object-position: center top;
    }
    .canvas.stacked .right-img svg {
      width: 100%;
      height: 100%;
    }

    /* ── Main headline ── */
    .headline {
      position: absolute;
      left: var(--hx);
      top: var(--hy);
      max-width: var(--hmw);
      font-family: 'Lato', sans-serif;
      font-weight: 900;
      font-size: var(--hs);
      line-height: 1.15;
      letter-spacing: var(--hls);
      color: #fff;
      text-wrap: pretty;
    }

    /* ── CTA button ── */
    .btn {
      position: absolute;
      left: var(--bx);
      top: var(--by);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 var(--bpad);
      height: var(--bh);
      border-radius: var(--br);
      background: linear-gradient(160deg, #209bc4 0%, #4dc9c0 100%);
      border: none;
      cursor: pointer;
    }
    .btn-text {
      font-family: 'Lato', sans-serif;
      font-weight: 400;
      font-size: var(--bfs);
      line-height: 1.45;
      color: #fff;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <nav class="size-nav">
    <button class="nav-btn active" data-format="linkedin">LinkedIn<small>1200×628</small></button>
    <button class="nav-btn" data-format="twitter">Twitter / X<small>1600×900</small></button>
    <button class="nav-btn" data-format="square">Square<small>1080×1080</small></button>
    <button class="nav-btn" data-format="portrait">Instagram<small>1080×1350</small></button>
    <button class="nav-btn" data-format="story">Story / TikTok<small>1080×1920</small></button>
  </nav>

  <nav class="hl-nav" id="hl-nav"></nav>

  <nav class="dl-nav">
    <span class="dl-label">Download</span>
    <button class="nav-btn dl-btn" data-dl="linkedin">LinkedIn</button>
    <button class="nav-btn dl-btn" data-dl="twitter">Twitter / X</button>
    <button class="nav-btn dl-btn" data-dl="square">Square</button>
    <button class="nav-btn dl-btn" data-dl="portrait">Instagram</button>
    <button class="nav-btn dl-btn" data-dl="story">Story</button>
    <button class="nav-btn dl-all-btn">Download All (ZIP)</button>
  </nav>

  </div>

  <script>
    var headlines = ["Reduce your CI infrastructure costs","95% Less Download Overhead.","Cache Smarter. Build Faster. Spend Less."];
    var currentFormat = 'linkedin';
    var currentHl = 0;

    var formats = {
      linkedin: { cw:1200, ch:628,  lx:63, ly:83,  lw:327, lh:91,  ix:747, iy:24,  ih:604,  hx:63, hy:218,  hs:82,  ls:-2,   hmw:700,  hmwFull:1100, bx:63, by:484,  bh:84,  bfs:30.6, bpad:39, br:8  },
      twitter:  { cw:1600, ch:900,  lx:84, ly:142, lw:436, lh:121, ix:996, iy:63,  ih:806,  hx:84, hy:322,  hs:109, ls:-2.7, hmw:933,  hmwFull:1466, bx:84, by:676,  bh:112, bfs:40.8, bpad:52, br:11 },
      square:   { cw:1080, ch:1080, lx:57, ly:80,  lw:294, lh:82,  ix:400, iy:420, ih:840,  hx:57, hy:210,  hs:90,  ls:-2.2, hmw:966,  hmwFull:966,  bx:57, by:450,  bh:84,  bfs:30.6, bpad:39, br:8  },
      portrait: { cw:1080, ch:1350, lx:57, ly:80,  lw:294, lh:82,  ix:460, iy:660, ih:800,  hx:57, hy:230,  hs:110, ls:-2.2, hmw:966, hmwFull:966, bx:57, by:780,  bh:90,  bfs:32,   bpad:42, br:9, capLines:4 },
      story:    { cw:1080, ch:1920, lx:57, ly:80,  lw:294, lh:82,  ix:150, iy:1100, ih:1020, hx:57, hy:300,  hs:130, ls:-2.5, hmw:966, hmwFull:966, bx:57, by:980,  bh:100, bfs:35,   bpad:45, br:10, capLines:4 }
    };

    var hasImg = !!document.querySelector('.right-img');

    function setFormat(name) {
      currentFormat = name;
      var f = formats[name];
      var c = document.getElementById('canvas');
      var vars = {
        '--cw': f.cw+'px',   '--ch': f.ch+'px',
        '--lx': f.lx+'px',   '--ly': f.ly+'px', '--lw': f.lw+'px', '--lh': f.lh+'px',
        '--ix': f.ix+'px',   '--iy': f.iy+'px', '--ih': f.ih+'px',
        '--hx': f.hx+'px',   '--hy': f.hy+'px', '--hs': f.hs+'px',
        '--hls': f.ls+'px',  '--hmw': (hasImg ? f.hmw : f.hmwFull)+'px',
        '--bx': f.bx+'px',   '--by': f.by+'px', '--bh': f.bh+'px',
        '--bfs': f.bfs+'px', '--bpad': f.bpad+'px', '--br': f.br+'px'
      };
      for (var k in vars) c.style.setProperty(k, vars[k]);
      c.classList.toggle('stacked', !!f.stacked);
      var el = document.getElementById('hl');
      el.innerHTML = headlines[currentHl];
      el.style.fontSize = '';
      capHeadline(f.hs, f.capLines || 2);
      preventOrphan(el);
      c.style.setProperty('--by', (f.hy + el.offsetHeight + 40) + 'px');
      document.querySelectorAll('.nav-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.format === name);
      });
    }

    function setHeadline(idx) {
      currentHl = idx;
      var el = document.getElementById('hl');
      el.innerHTML = headlines[idx];
      el.style.fontSize = '';
      var f = formats[currentFormat];
      capHeadline(f.hs, f.capLines || 2);
      preventOrphan(el);
      document.getElementById('canvas').style.setProperty('--by', (f.hy + el.offsetHeight + 40) + 'px');
      document.querySelectorAll('.hl-btn').forEach(function(b) {
        b.classList.toggle('active', parseInt(b.dataset.idx) === idx);
      });
    }

    function capHeadline(base, maxLines) {
      maxLines = maxLines || 2;
      var el = document.getElementById('hl');
      var size = base;
      var maxH = Math.ceil(maxLines * size * 1.15) + 2;
      while (el.scrollHeight > maxH && size > 30) {
        size -= 1;
        el.style.fontSize = size + 'px';
        maxH = Math.ceil(maxLines * size * 1.15) + 2;
      }
    }

    function preventOrphan(el) {
      el.innerHTML = el.innerHTML.replace(/\s(\S+)\s*$/, ' ');
    }

    document.querySelectorAll('.nav-btn').forEach(function(b) {
      b.addEventListener('click', function() { setFormat(b.dataset.format); });
    });

    if (headlines.length > 1) {
      var hlNav = document.getElementById('hl-nav');
      headlines.forEach(function(hl, i) {
        var btn = document.createElement('button');
        btn.className = 'nav-btn hl-btn' + (i === 0 ? ' active' : '');
        btn.dataset.idx = i;
        btn.textContent = 'Headline ' + (i + 1);
        btn.title = hl.replace(/<br>/g, ' ');
        btn.addEventListener('click', function() { setHeadline(i); });
        hlNav.appendChild(btn);
      });
    }

    setFormat('linkedin');

    var dlLabels = { linkedin:'LinkedIn', twitter:'Twitter / X', square:'Square', portrait:'Instagram', story:'Story' };

    function captureFormat(name) {
      return new Promise(function(resolve) {
        var prev = currentFormat;
        setFormat(name);
        var f = formats[name];
        var el = document.getElementById('canvas');
        document.fonts.ready.then(function() {
          html2canvas(el, { width: f.cw, height: f.ch, scale: 1, useCORS: true, allowTaint: true, logging: false }).then(function(cvs) {
            setFormat(prev);
            resolve({ name: name, dataUrl: cvs.toDataURL('image/png') });
          });
        });
      });
    }

    function downloadOne(name) {
      var btn = document.querySelector('.dl-btn[data-dl="' + name + '"]');
      if (btn) { btn.textContent = '…'; btn.disabled = true; }
      captureFormat(name).then(function(r) {
        var a = document.createElement('a');
        a.download = 'gradle-ad-' + r.name + '.png';
        a.href = r.dataUrl;
        a.click();
        if (btn) { btn.textContent = dlLabels[name]; btn.disabled = false; }
      });
    }

    function downloadAll() {
      var allBtn = document.querySelector('.dl-all-btn');
      var fmts = ['linkedin','twitter','square','portrait','story'];
      if (allBtn) { allBtn.textContent = 'Working…'; allBtn.disabled = true; }
      document.querySelectorAll('.dl-btn').forEach(function(b) { b.disabled = true; });
      var zip = new JSZip();
      var chain = Promise.resolve();
      fmts.forEach(function(name) {
        chain = chain.then(function() {
          return captureFormat(name).then(function(r) {
            zip.file('gradle-ad-' + r.name + '.png', r.dataUrl.split(',')[1], { base64: true });
          });
        });
      });
      chain.then(function() {
        zip.generateAsync({ type: 'blob' }).then(function(blob) {
          var a = document.createElement('a');
          a.download = 'gradle-ads.zip';
          a.href = URL.createObjectURL(blob);
          a.click();
          if (allBtn) { allBtn.textContent = 'Download All (ZIP)'; allBtn.disabled = false; }
          document.querySelectorAll('.dl-btn').forEach(function(b) { b.disabled = false; });
        });
      });
    }

    document.querySelectorAll('.dl-btn').forEach(function(b) {
      b.addEventListener('click', function() { downloadOne(b.dataset.dl); });
    });
    document.querySelector('.dl-all-btn').addEventListener('click', downloadAll);
  </script>
